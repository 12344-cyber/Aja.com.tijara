<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صل على محمد - تصميم وتحميل الصور الدعوية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Reem+Kufi+Fun:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Cairo', 'Reem Kufi Fun', sans-serif;
            padding: 20px;
            gap: 30px;
            background-image: radial-gradient(circle at 30% 40%, #1a1025 0%, #03010a 90%);
        }

        /* منطقة التصميم */
        .design-area {
            position: relative;
            width: 600px;
            height: 600px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(255, 0, 50, 0.6), 0 0 160px rgba(255, 80, 0, 0.4);
            border: 3px solid rgba(255, 60, 30, 0.7);
            animation: borderPulse 1.5s infinite;
        }

        @keyframes borderPulse {
            0%, 100% { border-color: rgba(255, 60, 30, 0.7); }
            50% { border-color: rgba(255, 160, 30, 0.9); }
        }

        /* Canvas للرسم */
        #mainCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #0a0015;
        }

        /* لوحة التحكم */
        .controls {
            background: rgba(20, 5, 30, 0.9);
            border-radius: 20px;
            padding: 25px 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 100, 50, 0.4);
            box-shadow: 0 0 40px rgba(255, 30, 0, 0.3);
            max-width: 650px;
            width: 100%;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .btn-download {
            background: linear-gradient(135deg, #ff2200, #ff6600);
            color: white;
            box-shadow: 0 8px 25px rgba(255, 50, 0, 0.5);
            font-size: 1.2rem;
            animation: btnGlow 1.5s infinite alternate;
        }

        @keyframes btnGlow {
            0% { box-shadow: 0 8px 25px rgba(255, 50, 0, 0.5); }
            100% { box-shadow: 0 12px 40px rgba(255, 120, 0, 0.8); }
        }

        .btn-download:hover {
            background: linear-gradient(135deg, #ff4400, #ff8800);
            transform: translateY(-3px);
            box-shadow: 0 15px 45px rgba(255, 80, 0, 0.9);
        }

        .btn-style {
            background: rgba(255, 255, 255, 0.1);
            color: #ffccaa;
            border: 2px solid rgba(255, 100, 50, 0.5);
        }

        .btn-style:hover {
            background: rgba(255, 50, 0, 0.2);
            border-color: #ff6600;
            color: white;
        }

        .btn-style.active {
            background: rgba(255, 60, 0, 0.4);
            border-color: #ff8800;
            color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 80, 0, 0.6);
        }

        .color-picker {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-dot {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .color-dot:hover {
            border-color: white;
            transform: scale(1.2);
        }

        .color-dot.active {
            border-color: #ffffff;
            box-shadow: 0 0 20px currentColor;
        }

        .label {
            color: #ffccaa;
            font-weight: 700;
            font-size: 1rem;
            margin: 0 5px;
        }

        /* شريط العنوان */
        .title {
            color: #ffaa66;
            font-size: 1.5rem;
            font-weight: 900;
            text-shadow: 0 0 30px #ff4400;
            text-align: center;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="title">✨ صلّ على محمد ﷺ ✨</div>

    <!-- منطقة التصميم -->
    <div class="design-area" id="designArea">
        <canvas id="mainCanvas" width="1200" height="1200"></canvas>
    </div>

    <!-- أزرار التحكم -->
    <div class="controls">
        <span class="label">🎨 تأثير الإضاءة:</span>
        <button class="btn btn-style active" onclick="changeLightMode('hazard')" id="btnHazard">🚨 ضوء الخطر</button>
        <button class="btn btn-style" onclick="changeLightMode('fireworks')" id="btnFireworks">🎆 ألعاب نارية</button>
        <button class="btn btn-style" onclick="changeLightMode('neon')" id="btnNeon">💡 نيون فسفوري</button>
        <button class="btn btn-style" onclick="changeLightMode('pulse')" id="btnPulse">💓 نبض متوهج</button>
        
        <span class="label">🎯 لون الثيم:</span>
        <div class="color-picker">
            <div class="color-dot active" style="background: #ff2200;" onclick="changeTheme('red')" id="dotRed"></div>
            <div class="color-dot" style="background: #ff6600;" onclick="changeTheme('orange')" id="dotOrange"></div>
            <div class="color-dot" style="background: #ff0099;" onclick="changeTheme('pink')" id="dotPink"></div>
            <div class="color-dot" style="background: #ffcc00;" onclick="changeTheme('gold')" id="dotGold"></div>
        </div>

        <button class="btn btn-download" onclick="downloadImage()">📥 تحميل الصورة</button>
    </div>

    <script>
        // ==================== إعدادات ====================
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;

        let lightMode = 'hazard'; // hazard, fireworks, neon, pulse
        let themeColor = 'red'; // red, orange, pink, gold
        let animationFrame;
        let particles = [];
        let time = 0;

        // الألوان حسب الثيم
        const themeColors = {
            red: { primary: '#ff2200', secondary: '#ff4400', glow: '#ff0000', accent: '#ff6644' },
            orange: { primary: '#ff6600', secondary: '#ff8800', glow: '#ff4400', accent: '#ffaa33' },
            pink: { primary: '#ff0099', secondary: '#ff33aa', glow: '#ff0066', accent: '#ff77bb' },
            gold: { primary: '#ffaa00', secondary: '#ffcc00', glow: '#ff8800', accent: '#ffdd44' }
        };

        // ==================== جسيمات ====================
        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 3 - 1;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.008;
                this.color = themeColors[themeColor];
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
                if (this.life <= 0) this.reset();
            }
            draw(ctx) {
                const alpha = this.life * 0.9;
                const c = this.color;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.shadowColor = c.glow;
                ctx.shadowBlur = this.size * 6;
                ctx.fillStyle = c.primary;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = c.secondary;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.6, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // إنشاء جسيمات
        for (let i = 0; i < 80; i++) {
            particles.push(new Particle());
        }

        // ==================== رسم النص ====================
        function drawText(glowIntensity, extraGlow = 0) {
            const c = themeColors[themeColor];
            const cx = W / 2;
            const cy = H / 2;

            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // طبقات التوهج
            const glowLayers = [
                { blur: 80, color: c.glow, alpha: 0.4 * glowIntensity },
                { blur: 50, color: c.primary, alpha: 0.6 * glowIntensity },
                { blur: 30, color: c.secondary, alpha: 0.7 * glowIntensity },
                { blur: 15, color: c.accent, alpha: 0.9 * glowIntensity },
            ];

            // رسم التوهج
            for (let layer of glowLayers) {
                ctx.save();
                ctx.shadowColor = layer.color;
                ctx.shadowBlur = layer.blur + extraGlow;
                ctx.globalAlpha = layer.alpha;
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 180px "Cairo", "Reem Kufi Fun", sans-serif';
                ctx.fillText('صَلِّ عَلَىٰ', cx, cy - 110);
                ctx.font = 'bold 220px "Cairo", "Reem Kufi Fun", sans-serif';
                ctx.fillText('مُحَمَّد', cx, cy + 110);
                ctx.restore();
            }

            // النص الأساسي
            ctx.save();
            ctx.shadowColor = c.glow;
            ctx.shadowBlur = 20 + extraGlow;
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 180px "Cairo", "Reem Kufi Fun", sans-serif';
            ctx.fillText('صَلِّ عَلَىٰ', cx, cy - 110);
            ctx.font = 'bold 220px "Cairo", "Reem Kufi Fun", sans-serif';
            ctx.fillText('مُحَمَّد', cx, cy + 110);

            // ﷺ
            ctx.font = 'bold 80px "Cairo", "Reem Kufi Fun", sans-serif';
            ctx.fillText('ﷺ', cx, cy + 220);
            ctx.restore();

            ctx.restore();
        }

        // ==================== رسم الخلفية ====================
        function drawBackground() {
            // خلفية داكنة مع تدرج
            const gradient = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, W*0.8);
            gradient.addColorStop(0, '#1a0a2e');
            gradient.addColorStop(0.5, '#0d0018');
            gradient.addColorStop(1, '#020008');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
        }

        // ==================== تأثيرات الإضاءة ====================
        function drawHazardEffect(intensity) {
            const c = themeColors[themeColor];
            // وميض متقطع مثل أضواء الخطر
            const flashOn = Math.sin(time * 0.3) > 0.3 || Math.sin(time * 0.7) > 0.6;

            if (flashOn) {
                const alpha = intensity * 0.35;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = c.glow;
                ctx.fillRect(0, 0, W, H);

                // حلقات متحدة المركز
                for (let i = 0; i < 5; i++) {
                    const radius = 250 + i * 100 + Math.sin(time + i) * 30;
                    ctx.strokeStyle = c.primary;
                    ctx.globalAlpha = alpha * (0.5 - i * 0.08);
                    ctx.lineWidth = 3 + i;
                    ctx.shadowColor = c.glow;
                    ctx.shadowBlur = 30;
                    ctx.beginPath();
                    ctx.arc(W/2, H/2, radius, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            }

            // خطوط أفقية متقطعة
            if (Math.sin(time * 0.5) > 0) {
                ctx.save();
                ctx.globalAlpha = 0.2 * intensity;
                ctx.strokeStyle = c.secondary;
                ctx.lineWidth = 8;
                ctx.shadowColor = c.glow;
                ctx.shadowBlur = 40;
                for (let y = 50; y < H; y += 120) {
                    const offset = Math.sin(time * 2 + y) * 40;
                    ctx.beginPath();
                    ctx.moveTo(100 + offset, y);
                    ctx.lineTo(W - 100 - offset, y);
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        function drawFireworksEffect(intensity) {
            const c = themeColors[themeColor];
            // رسم الجسيمات
            particles.forEach(p => {
                p.update();
                p.draw(ctx);
            });

            // دفعات نارية
            const burstCount = 6;
            for (let b = 0; b < burstCount; b++) {
                const bx = W * (0.2 + b * 0.12) + Math.sin(time * 1.5 + b) * 60;
                const by = H * (0.3 + Math.cos(time * 0.8 + b) * 0.3);
                const burstSize = 15 + Math.sin(time * 3 + b) * 10;

                ctx.save();
                ctx.globalAlpha = 0.6 * intensity;
                ctx.shadowColor = c.glow;
                ctx.shadowBlur = burstSize * 3;
                ctx.fillStyle = c.primary;

                // نجمة نارية
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2 + time * 0.5;
                    const dist = burstSize;
                    const px = bx + Math.cos(angle) * dist;
                    const py = by + Math.sin(angle) * dist;
                    ctx.beginPath();
                    ctx.arc(px, py, 3 + Math.random() * 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function drawNeonEffect(intensity) {
            const c = themeColors[themeColor];
            // خطوط نيون حول النص
            ctx.save();
            ctx.globalAlpha = 0.5 * intensity;
            ctx.strokeStyle = c.primary;
            ctx.lineWidth = 4;
            ctx.shadowColor = c.glow;
            ctx.shadowBlur = 50;

            const cx = W / 2;
            const cy = H / 2;

            // مستطيل نيون
            const rectW = 650 + Math.sin(time) * 30;
            const rectH = 480 + Math.cos(time * 0.7) * 20;
            ctx.strokeRect(cx - rectW/2, cy - rectH/2, rectW, rectH);

            // زوايا مضيئة
            const cornerSize = 50;
            const corners = [
                { x: cx - rectW/2, y: cy - rectH/2 },
                { x: cx + rectW/2, y: cy - rectH/2 },
                { x: cx - rectW/2, y: cy + rectH/2 },
                { x: cx + rectW/2, y: cy + rectH/2 },
            ];

            ctx.fillStyle = c.secondary;
            corners.forEach(corner => {
                ctx.beginPath();
                ctx.arc(corner.x, corner.y, 12, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.restore();
        }

        function drawPulseEffect(intensity) {
            const c = themeColors[themeColor];
            const pulse = Math.sin(time * 0.08) * 0.5 + 0.5;

            // نبضات دائرية
            for (let i = 0; i < 4; i++) {
                const phase = (time * 0.03 + i * 0.25) % 1;
                const radius = 200 + phase * 400;
                const alpha = (1 - phase) * 0.3 * intensity * pulse;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = c.primary;
                ctx.lineWidth = 3;
                ctx.shadowColor = c.glow;
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.arc(W/2, H/2, radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            // توهج مركزي
            ctx.save();
            ctx.globalAlpha = 0.15 * intensity * pulse;
            const gradient = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, 400);
            gradient.addColorStop(0, c.glow);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            ctx.restore();
        }

        // ==================== حلقة الرسم الرئيسية ====================
        function animate() {
            time++;
            drawBackground();

            let glowIntensity = 1;
            let extraGlow = 0;

            switch (lightMode) {
                case 'hazard':
                    const flashOn = Math.sin(time * 0.3) > 0.3 || Math.sin(time * 0.7) > 0.6;
                    glowIntensity = flashOn ? 1.4 : 0.5;
                    extraGlow = flashOn ? 30 : 5;
                    drawHazardEffect(1);
                    break;
                case 'fireworks':
                    glowIntensity = 0.9 + Math.sin(time * 0.05) * 0.3;
                    extraGlow = 15;
                    drawFireworksEffect(1);
                    break;
                case 'neon':
                    glowIntensity = 0.8 + Math.sin(time * 0.04) * 0.2;
                    extraGlow = 10;
                    drawNeonEffect(1);
                    break;
                case 'pulse':
                    const pulse = Math.sin(time * 0.08) * 0.5 + 0.5;
                    glowIntensity = 0.7 + pulse * 0.6;
                    extraGlow = pulse * 40;
                    drawPulseEffect(1);
                    break;
            }

            drawText(glowIntensity, extraGlow);

            // وميض أبيض سريع إضافي (تأثير فلاش)
            if (Math.random() < 0.03 && lightMode === 'hazard') {
                ctx.save();
                ctx.globalAlpha = 0.15;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, W, H);
                ctx.restore();
            }

            animationFrame = requestAnimationFrame(animate);
        }

        // ==================== تحميل الصورة ====================
        function downloadImage() {
            // إيقاف الأنيميشن مؤقتاً لرسم إطار نظيف
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = W;
            tempCanvas.height = H;
            const tempCtx = tempCanvas.getContext('2d');

            // نسخ المحتوى الحالي
            tempCtx.drawImage(canvas, 0, 0);

            // تحميل
            const link = document.createElement('a');
            link.download = 'صلي_على_محمد.png';
            link.href = tempCanvas.toDataURL('image/png');
            link.click();

            // تأثير بصري للتأكيد
            const btn = document.querySelector('.btn-download');
            const originalText = btn.textContent;
            btn.textContent = '✅ تم التحميل!';
            btn.style.background = 'linear-gradient(135deg, #00cc44, #00aa33)';
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = 'linear-gradient(135deg, #ff2200, #ff6600)';
            }, 1500);
        }

        // ==================== تغيير الأوضاع ====================
        function changeLightMode(mode) {
            lightMode = mode;
            // تحديث الأزرار
            document.querySelectorAll('.btn-style').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
        }

        function changeTheme(color) {
            themeColor = color;
            // تحديث النقاط
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            document.getElementById('dot' + color.charAt(0).toUpperCase() + color.slice(1)).classList.add('active');
            // تحديث ألوان الجسيمات
            particles.forEach(p => {
                p.color = themeColors[themeColor];
            });
        }

        // ==================== بدء التشغيل ====================
        animate();

        // تعديل حجم الكانفاس مع الشاشة
        function resizeCanvas() {
            const area = document.getElementById('designArea');
            const rect = area.getBoundingClientRect();
            // نحافظ على نسبة 1:1 داخل الـ canvas
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        console.log('✨ النظام الدعوي جاهز - صل على محمد ﷺ');
        console.log('📥 اضغط زر التحميل لحفظ الصورة');
        console.log('🎨 جرب أوضاع الإضاءة المختلفة والألوان');
    </script>
</body>
</html>
