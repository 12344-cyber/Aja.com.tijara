<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>صلّ على محمد | بطاقة دعوية مضيئة</title>
  <!-- خطوط عربية أنيقة -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Reem+Kufi+Fun:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Cairo', 'Reem Kufi Fun', sans-serif;
      padding: 20px;
      margin: 0;
      /* خلفية داكنة مع وميض بسيط */
      background-image: radial-gradient(circle at 30% 40%, #1a1025 0%, #03010a 90%);
    }

    /* الحاوية الرئيسية للبطاقة - تشبه شاشة عرض أو لافتة */
    .prayer-card {
      max-width: 700px;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: radial-gradient(ellipse at center, #1e132a 0%, #0b0514 100%);
      border-radius: 48px;
      position: relative;
      overflow: hidden;
      box-shadow: 
        0 0 60px rgba(180, 0, 80, 0.5),
        0 0 120px rgba(255, 60, 0, 0.4),
        0 20px 40px rgba(0,0,0,0.8);
      border: 2px solid rgba(255, 80, 40, 0.5);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* تأثير حدود نابض */
    .prayer-card::before {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 52px;
      padding: 4px;
      background: conic-gradient(
        from 0deg,
        #ff3366,
        #ff9933,
        #ff3366,
        #ff0066,
        #ff9933,
        #ff3366
      );
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: borderGlow 2.5s linear infinite;
      z-index: 0;
      opacity: 0.9;
    }

    @keyframes borderGlow {
      0% { filter: hue-rotate(0deg) brightness(1.2); }
      50% { filter: hue-rotate(25deg) brightness(1.6); }
      100% { filter: hue-rotate(0deg) brightness(1.2); }
    }

    /* طبقة الجسيمات النارية (الألعاب النارية) */
    .fireworks-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #ffaa00;
      border-radius: 50%;
      box-shadow: 0 0 18px #ff5500, 0 0 35px #ff2200;
      animation: floatFire 3s infinite ease-in-out;
      opacity: 0;
      filter: blur(0.5px);
    }

    /* توليد جسيمات متعددة بمواقع وأوقات مختلفة */
    .particle:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; background: #ff3b3b; box-shadow: 0 0 25px #ff0000; }
    .particle:nth-child(2) { top: 75%; left: 85%; animation-delay: 0.8s; background: #ffaa33; box-shadow: 0 0 30px #ff7700; }
    .particle:nth-child(3) { top: 20%; left: 80%; animation-delay: 1.4s; background: #ff6699; box-shadow: 0 0 22px #ff0066; }
    .particle:nth-child(4) { top: 80%; left: 15%; animation-delay: 2.1s; background: #ffcc00; box-shadow: 0 0 28px #ffaa00; }
    .particle:nth-child(5) { top: 45%; left: 5%; animation-delay: 0.4s; background: #ff3366; box-shadow: 0 0 20px #ff0044; }
    .particle:nth-child(6) { top: 55%; left: 92%; animation-delay: 1.1s; background: #ff9933; box-shadow: 0 0 32px #ff5500; }
    .particle:nth-child(7) { top: 10%; left: 50%; animation-delay: 2.5s; background: #ffbb33; box-shadow: 0 0 26px #ff8800; }
    .particle:nth-child(8) { top: 88%; left: 45%; animation-delay: 1.8s; background: #ff2a4a; box-shadow: 0 0 24px #ff0033; }
    .particle:nth-child(9) { top: 35%; left: 70%; animation-delay: 0.6s; background: #ffaa00; box-shadow: 0 0 29px #ff6600; }
    .particle:nth-child(10) { top: 60%; left: 30%; animation-delay: 2.8s; background: #ff6688; box-shadow: 0 0 21px #ff2255; }

    @keyframes floatFire {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.2);
      }
      15% {
        opacity: 1;
        transform: translateY(-20px) scale(1.1);
      }
      35% {
        opacity: 0.9;
        transform: translateY(-45px) scale(0.8);
      }
      55% {
        opacity: 0.7;
        transform: translateY(-15px) scale(1.3);
      }
      75% {
        opacity: 0.2;
        transform: translateY(-35px) scale(0.5);
      }
      100% {
        opacity: 0;
        transform: translateY(10px) scale(0);
      }
    }

    /* طبقة النص الرئيسي مع الحركة الذكية */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      padding: 25px;
      width: 100%;
    }

    .phrase {
      font-size: clamp(2.8rem, 12vw, 5.5rem);
      font-weight: 900;
      line-height: 1.2;
      text-shadow: 
        0 0 20px #ff0044,
        0 0 40px #ff5500,
        0 0 80px #ff2200;
      letter-spacing: 2px;
      background: linear-gradient(180deg, #ffffff 20%, #ffddaa 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 25px #ff3366);
      animation: textPulse 1.8s infinite alternate, intelligentMove 4s ease-in-out infinite;
      display: inline-block;
    }

    /* حركة ذكية: تمايل + تغيير حجم خفيف + إضاءة */
    @keyframes textPulse {
      0% {
        text-shadow: 0 0 25px #ff0044, 0 0 45px #ff5500, 0 0 85px #ff2200;
        filter: drop-shadow(0 0 30px #ff3366);
      }
      100% {
        text-shadow: 0 0 40px #ff6600, 0 0 70px #ff3300, 0 0 110px #ff0000;
        filter: drop-shadow(0 0 50px #ff6633);
      }
    }

    @keyframes intelligentMove {
      0% {
        transform: translateY(0px) rotate(0deg) scale(1);
      }
      15% {
        transform: translateY(-6px) rotate(0.8deg) scale(1.03);
      }
      30% {
        transform: translateY(2px) rotate(-0.5deg) scale(0.98);
      }
      45% {
        transform: translateY(-8px) rotate(0.4deg) scale(1.04);
      }
      60% {
        transform: translateY(0px) rotate(-0.2deg) scale(1);
      }
      75% {
        transform: translateY(4px) rotate(0.7deg) scale(1.02);
      }
      100% {
        transform: translateY(0px) rotate(0deg) scale(1);
      }
    }

    .sub-text {
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 700;
      color: #ffddbb;
      text-shadow: 0 0 18px #ff4400, 0 0 35px #aa2200;
      letter-spacing: 1px;
      animation: softGlow 2s infinite alternate;
      margin-top: 5px;
    }

    @keyframes softGlow {
      0% { opacity: 0.9; text-shadow: 0 0 20px #ff4400; }
      100% { opacity: 1; text-shadow: 0 0 45px #ff8800, 0 0 70px #ff3300; }
    }

    /* تأثير ضوء الخطر / الفسفوري المزدوج (يومض مثل سيارة الإطفاء) */
    .hazard-light {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      border-radius: 38px;
      z-index: 5;
      pointer-events: none;
      background: transparent;
      box-shadow: inset 0 0 80px rgba(255, 30, 0, 0.6);
      animation: hazardFlash 0.9s infinite step-end;
      mix-blend-mode: screen;
    }

    @keyframes hazardFlash {
      0%, 100% {
        box-shadow: inset 0 0 100px rgba(255, 60, 0, 0.9), 0 0 60px rgba(255, 0, 50, 0.8);
        background: rgba(255, 20, 0, 0.15);
      }
      50% {
        box-shadow: inset 0 0 40px rgba(255, 140, 0, 0.4), 0 0 20px rgba(255, 80, 0, 0.4);
        background: rgba(255, 80, 0, 0.05);
      }
    }

    /* وميض سريع إضافي على شكل خطوط */
    .extra-flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255,100,0,0.3) 0%, transparent 70%);
      z-index: 4;
      pointer-events: none;
      animation: extraBlink 1.2s infinite;
      border-radius: 48px;
    }

    @keyframes extraBlink {
      0%, 100% { opacity: 0.2; }
      30% { opacity: 0.7; }
      60% { opacity: 0.1; }
    }

    /* شريط متحرك صغير */
    .moving-bar {
      position: absolute;
      bottom: 30px;
      left: 15%;
      width: 70%;
      height: 6px;
      background: linear-gradient(90deg, transparent, #ff5500, #ffcc00, #ff5500, transparent);
      border-radius: 10px;
      z-index: 12;
      filter: blur(2px);
      animation: moveBar 2.5s linear infinite;
      box-shadow: 0 0 30px #ff4400;
    }

    @keyframes moveBar {
      0% { transform: translateX(-20%); opacity: 0.7; }
      50% { transform: translateX(20%); opacity: 1; }
      100% { transform: translateX(-20%); opacity: 0.7; }
    }

    /* توقيع أو آية صغيرة */
    .footer-note {
      position: absolute;
      bottom: 70px;
      z-index: 12;
      color: rgba(255, 220, 180, 0.9);
      font-size: 1rem;
      font-weight: 600;
      text-shadow: 0 0 12px black;
      background: rgba(0,0,0,0.4);
      padding: 5px 20px;
      border-radius: 30px;
      backdrop-filter: blur(5px);
    }

    /* جعل البطاقة مناسبة للنشر على فيسبوك (نسبة 1:1 مثالية) */
    @media (max-width: 480px) {
      .prayer-card {
        border-radius: 36px;
        aspect-ratio: 1 / 1;
      }
      .phrase {
        font-size: 3.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="prayer-card">
    <!-- طبقة الجسيمات النارية -->
    <div class="fireworks-layer">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <!-- تأثير الضوء الخطر / الفسفوري -->
    <div class="hazard-light"></div>
    <div class="extra-flash"></div>

    <!-- المحتوى النصي المتحرك -->
    <div class="content">
      <span class="phrase">صَلِّ عَلَىٰ</span>
      <span class="phrase" style="font-size: clamp(3.2rem, 14vw, 6rem);">مُحَمَّد</span>
      <div class="sub-text">ﷺ</div>
    </div>

    <!-- شريط ضوئي متحرك -->
    <div class="moving-bar"></div>
    <div class="footer-note">اللهم صلِّ وسلم عليه ❤️</div>
  </div>

  <!-- توضيح: يمكنك أخذ لقطة شاشة أو استخدام المتصفح لحفظ الصورة -->
</body>
</html>
